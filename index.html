<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HYPECUT — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --pink:   #FF2DB8;
      --purple: #9B2EFF;
      --blue:   #3B2FFF;
      --grad:   linear-gradient(135deg, #FF2DB8, #9B2EFF, #3B2FFF);
      --grad-h: linear-gradient(135deg, #FF5ED0, #B55FFF, #6057FF);
      --bg:     #080808;
      --card:   #111111;
      --input:  #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text:   #ffffff;
      --muted:  rgba(255,255,255,0.45);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 0%,   rgba(255,45,184,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%,  rgba(59,47,255,0.14)  0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 28px 16px;
    }

    .wrapper { width: 100%; max-width: 480px; }

    /* ── Brand ── */
    .brand { text-align: center; margin-bottom: 30px; }
    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.4rem;
      letter-spacing: 6px;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .brand-tag {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
    }
    .brand-tag span { color: var(--pink); margin: 0 6px; opacity: 0.7; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid rgba(255,45,184,0.18);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(59,47,255,0.1),
        0 30px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(155,46,255,0.08);
    }

    .card-bar {
      height: 3px;
      background: linear-gradient(90deg, #FF2DB8, #9B2EFF, #3B2FFF, #9B2EFF, #FF2DB8);
      background-size: 300% 100%;
      animation: barMove 4s linear infinite;
    }
    @keyframes barMove {
      0%   { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    .card-body { padding: 36px 40px 44px; }

    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    .card-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 30px;
    }

    /* ── Inputs ── */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      background: var(--input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.93rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(155,46,255,0.18), 0 0 20px rgba(255,45,184,0.08);
    }

    /* ── Error message ── */
    .error-box {
      background: rgba(255,77,106,0.1);
      border: 1px solid rgba(255,77,106,0.4);
      color: #ff6b8a;
      border-radius: 10px;
      padding: 11px 15px;
      font-size: 0.82rem;
      margin-bottom: 18px;
      display: none;
      font-family: 'Inter', sans-serif;
    }

    /* ── Button ── */
    .btn-wrap {
      margin-top: 10px;
      border-radius: 11px;
      padding: 1.5px;
      background: var(--grad);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--grad);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    @media (max-width: 520px) {
      .card-body { padding: 28px 20px 32px; }
      .brand-logo { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="brand">
    <div class="brand-logo">HYPECUT</div>
    <div class="brand-tag">Edit <span>•</span> Create <span>•</span> Elevate</div>
  </div>

  <div class="card">
    <div class="card-bar"></div>
    <div class="card-body">

      <p class="card-title">Member Login</p>
      <p class="card-sub">Access your exclusive videos and resources ✦</p>

      <div class="error-box" id="errorBox"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <div class="btn-wrap">
        <button class="btn" id="loginBtn" onclick="handleLogin()">
          <span id="btnText">Sign In</span>
          <span class="spinner" id="spinner"></span>
        </button>
      </div>

      <p class="footer-note">No account? Contact HYPECUT to get access.</p>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "dashboard.html";
  });

  window.handleLogin = async function () {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const errBox   = document.getElementById("errorBox");
    const spinner  = document.getElementById("spinner");
    const btnText  = document.getElementById("btnText");

    errBox.style.display = "none";
    if (!email || !password) { showError("Please fill in both fields."); return; }

    btn.disabled = true;
    btnText.textContent = "Signing in…";
    spinner.classList.add("show");

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      const msgs = {
        "auth/user-not-found":    "No account found with this email.",
        "auth/wrong-password":    "Incorrect password. Try again.",
        "auth/invalid-email":     "Please enter a valid email address.",
        "auth/too-many-requests": "Too many attempts. Please try later.",
        "auth/invalid-credential":"Invalid email or password.",
      };
      showError(msgs[err.code] || "Sign-in failed. Please try again.");
      btn.disabled = false;
      btnText.textContent = "Sign In";
      spinner.classList.remove("show");
    }
  };

  function showError(msg) {
    const el = document.getElementById("errorBox");
    el.textContent = "⚠ " + msg;
    el.style.display = "block";
  }

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.handleLogin();
  });
</script>

</body>
</html>
