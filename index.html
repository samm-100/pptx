      {title:"Cut losses fast, let winners run", body:"Exit immediately when stop is hit — no hope, no averaging down. But let winning trades run until a sell signal appears. Asymmetry is the edge."},
      {title:"Portfolio-level rules", body:"If overall portfolio falls 7-8% from peak, stop trading new positions. Market may be turning. Cash is a position — protect it."}
    ]
  },
  {
    num:10, title:"Full Trade Example", icon:"🎯",
    bg:"linear-gradient(135deg,#D85A30 0%,#993C1D 100%)",
    borderColor:"rgba(240,153,123,0.6)", numBg:"#993C1D", numTxt:"#F5C4B3",
    tagline:"All 9 steps working together in one complete trade",
    intro:"Let's walk through a complete trade from start to finish — sector selection all the way to exit. This is how all 9 steps work together.",
    heroImg:"https://images.unsplash.com/photo-1559526323-cb2f2fe2591b?w=1200&q=80",
    inlineImg:"https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?w=900&q=80",
    inlineCap:"🎯 TCS trade: IT sector → RS 88 → Pivot ₹3850 → Stop ₹3650 → Exit +22%",
    points:[
      {title:"Step 1 — Market is in uptrend", body:"Nifty 50 is above 50-day MA, making higher highs. FII data shows net buying for 3 weeks. Market condition: Green. Proceed."},
      {title:"Step 2 — Sector: Nifty IT leading", body:"Nifty IT ETF up 8% in 4 weeks vs Nifty up 3%. RS line of IT vs Nifty trending up. IT sector selected as leading sector."},
      {title:"Step 3 — Leader: TCS identified", body:"TCS has RS rank 88, MF holdings increased last quarter, stock in tight 12% base near 52-week highs. All leader filters pass."},
      {title:"Step 4 — Entry at pivot ₹3850", body:"TCS breaks above ₹3850 (base high) on 2x average volume. Entry triggered. Stop set at ₹3650 (below base low = 5.2% risk)."},
      {title:"Step 5 — Exit at +20% or stop hit", body:"TCS rises to ₹4620 over 8 weeks (+20%). RS line still rising. Sold half at +20%, trail stop on rest. Full exit at ₹4700. Final gain: 22%."}
    ]
  }
];

const funnel = document.getElementById('funnel');
let activeStep = null;

steps.forEach((s, i) => {
  const maxW = 700, minW = 280;
  const ratio = 1 - (i / (steps.length - 1)) * 0.44;
  const containerW = Math.min(document.body.offsetWidth - 40, 700);
  const w = Math.round(minW + (maxW - minW) * ratio * (containerW / maxW));

  if (i > 0) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    funnel.appendChild(conn);
  }

  const step = document.createElement('div');
  step.className = 'funnel-step';
  step.id = 'step-' + i;
  step.style.cssText = `width:${w}px;height:66px;background:${s.bg};border-radius:12px;border:1px solid ${s.borderColor};clip-path:polygon(0 0,100% 0,calc(100% - 18px) 100%,18px 100%);`;
  step.innerHTML = `<div class="funnel-inner">
    <div class="step-num" style="background:${s.numBg};color:${s.numTxt}">${s.num}</div>
    <div class="step-title" style="color:#fff;max-width:${w-130}px">${s.title}</div>
    <div class="step-icon">${s.icon}</div>
  </div>`;
  step.onclick = () => openPopup(i);
  funnel.appendChild(step);
});

function openPopup(i) {
  const s = steps[i];
  if (activeStep !== null) document.getElementById('step-' + activeStep)?.classList.remove('active');
  activeStep = i;
  document.getElementById('step-' + i).classList.add('active');

  // Left panel: hero image + gradient
  const heroImg = document.getElementById('popup-hero-img');
  heroImg.src = s.heroImg || '';
  heroImg.alt = s.title;

  // Tint left panel with step color
  document.getElementById('popup-left').style.background = s.bg;

  document.getElementById('popup-icon').textContent = s.icon;
  document.getElementById('popup-num').textContent = `STEP ${s.num} OF ${steps.length}`;
  document.getElementById('popup-title').textContent = s.title;
  document.getElementById('popup-tagline').textContent = s.tagline || '';
  document.getElementById('popup-intro').textContent = s.intro;
  document.getElementById('popup-step-counter').textContent = `${s.num} / ${steps.length}`;

  // Inline image strip
  const slot = document.getElementById('popup-img-slot');
  slot.innerHTML = s.inlineImg ? `<div class="popup-img-block"><img src="${s.inlineImg}" alt="${s.title}" onerror="this.parentElement.style.display='none'"><div class="img-cap">${s.inlineCap||''}</div></div>` : '';

  const list = document.getElementById('popup-points');
  list.innerHTML = '';
  s.points.forEach((p, pi) => {
    const item = document.createElement('div');
    item.className = 'point-item';
    item.innerHTML = `<div class="point-dot">${pi+1}</div><div class="point-text"><strong>${p.title}</strong><span>${p.body}</span></div>`;
    list.appendChild(item);
  });

  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-prev').style.opacity = i === 0 ? '0.4' : '1';
  document.getElementById('btn-next').disabled = i === steps.length - 1;
  document.getElementById('btn-next').style.opacity = i === steps.length - 1 ? '0.4' : '1';

  // Scroll right panel back to top
  document.getElementById('popup-right').scrollTop = 0;

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function navigatePopup(dir) {
  if (activeStep === null) return;
  const next = activeStep + dir;
  if (next >= 0 && next < steps.length) openPopup(next);
}

function closePopup(e) {
  if (e.target === document.getElementById('overlay')) closePopupDirect();
}
function closePopupDirect() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
  if (activeStep !== null) { document.getElementById('step-' + activeStep)?.classList.remove('active'); activeStep = null; }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePopupDirect();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigatePopup(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigatePopup(-1);
});
</script>
